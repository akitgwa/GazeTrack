<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance | System</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e63946;
            --red-dim: rgba(230, 57, 70, 0.15);
            --red-glow: rgba(230, 57, 70, 0.4);
            --bg: #080a0e;
            --surface: rgba(12, 16, 22, 0.9);
            --border: rgba(230, 57, 70, 0.2);
            --text: #c9d1d9;
            --text-dim: #4a5568;
            --storm: rgba(255,255,255,0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Storm cloud layers */
        .cloud-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .cloud-layer::before,
        .cloud-layer::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
        }

        .cloud-layer::before {
            width: 600px; height: 400px;
            background: radial-gradient(ellipse, rgba(20, 5, 5, 0.9), transparent 70%);
            top: -100px; left: -100px;
            animation: driftA 20s ease-in-out infinite alternate;
        }

        .cloud-layer::after {
            width: 500px; height: 350px;
            background: radial-gradient(ellipse, rgba(230, 57, 70, 0.06), transparent 70%);
            bottom: -80px; right: -80px;
            animation: driftB 25s ease-in-out infinite alternate;
        }

        @keyframes driftA {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(80px, 60px) scale(1.1); }
        }
        @keyframes driftB {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(-60px, -40px) scale(1.15); }
        }

        /* Lightning flicker */
        .lightning {
            position: fixed;
            inset: 0;
            background: rgba(230, 57, 70, 0.03);
            z-index: 0;
            pointer-events: none;
            animation: flicker 8s infinite;
        }

        @keyframes flicker {
            0%, 94%, 96%, 100% { opacity: 0; }
            95% { opacity: 1; }
        }

        /* Grid overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(230,57,70,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(230,57,70,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .system-tag {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: var(--red);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .system-tag::before,
        .system-tag::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--red));
        }

        .system-tag::after {
            background: linear-gradient(to left, transparent, var(--red));
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 30px rgba(230, 57, 70, 0.3);
            line-height: 1.1;
        }

        h1 span {
            color: var(--red);
        }

        .subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.72rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            margin-top: 8px;
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 32px;
            position: relative;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.5),
                0 20px 60px rgba(0,0,0,0.8),
                inset 0 1px 0 rgba(255,255,255,0.04);
        }

        /* Corner accents */
        .card::before, .card::after {
            content: '';
            position: absolute;
            width: 16px; height: 16px;
            border-color: var(--red);
            border-style: solid;
        }

        .card::before {
            top: -1px; left: -1px;
            border-width: 2px 0 0 2px;
        }

        .card::after {
            bottom: -1px; right: -1px;
            border-width: 0 2px 2px 0;
        }

        /* Field group */
        .field {
            margin-bottom: 20px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-family: 'Share Tech Mono', monospace;
            color: var(--red);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        label .dot {
            width: 4px; height: 4px;
            background: var(--red);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--red);
        }

        input[type="text"], select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.07);
            border-bottom: 1px solid rgba(230, 57, 70, 0.3);
            border-radius: 2px;
            color: #fff;
            padding: 12px 14px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        input[type="text"]::placeholder {
            color: var(--text-dim);
            font-weight: 400;
        }

        select option {
            background: #0d1117;
            color: #fff;
        }

        input:focus, select:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 1px rgba(230,57,70,0.2), 0 4px 20px rgba(230,57,70,0.1);
        }

        /* File upload */
        .file-zone {
            position: relative;
            border: 1px dashed rgba(230, 57, 70, 0.25);
            border-radius: 2px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            background: rgba(230, 57, 70, 0.02);
            transition: all 0.2s;
        }

        .file-zone:hover {
            border-color: var(--red);
            background: var(--red-dim);
        }

        .file-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 8px;
            filter: grayscale(0.3);
        }

        .file-zone-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        .file-zone-text span {
            color: var(--red);
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(230,57,70,0.2), transparent);
            margin: 24px 0;
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 2px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
            box-shadow: 0 0 20px rgba(230,57,70,0.3);
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.4s;
        }

        .btn-submit:hover {
            background: #c1121f;
            box-shadow: 0 0 30px rgba(230,57,70,0.5);
            transform: translateY(-1px);
        }

        .btn-submit:hover::before { left: 100%; }
        .btn-submit:active { transform: translateY(0); }

        /* Download */
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
            padding: 13px;
            background: transparent;
            border: 1px solid rgba(230,57,70,0.4);
            border-radius: 2px;
            color: var(--red);
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: all 0.2s;
            animation: borderPulse 2s infinite;
        }

        @keyframes borderPulse {
            0%, 100% { border-color: rgba(230,57,70,0.4); }
            50% { border-color: rgba(230,57,70,0.9); box-shadow: 0 0 15px rgba(230,57,70,0.2); }
        }

        .download-btn:hover {
            background: var(--red-dim);
            border-color: var(--red);
        }

        /* Status bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--red);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>

    <div class="cloud-layer"></div>
    <div class="lightning"></div>

    <div class="container">
        <div class="header">
            <div class="system-tag">SYSTEM ACTIVE</div>
            <h1>Smart <span>Attend</span></h1>
            <p class="subtitle">// FACIAL RECOGNITION ATTENDANCE PROTOCOL</p>
        </div>

        <div class="card">
            <form action="/upload" method="post" enctype="multipart/form-data">

                <div class="field">
                    <label><span class="dot"></span> Instructor ID</label>
                    <input type="text" name="teacher" placeholder="Enter instructor name" required>
                </div>

                <div class="field">
                    <label><span class="dot"></span> Course Module</label>
                    <select name="subject" required>
                        <option value="" disabled selected>— Select Subject —</option>
                        <option value="Discrete Mathematics">Discrete Mathematics</option>
                        <option value="Python">Python</option>
                        <option value="Organisational Behaviour">Organisational Behaviour</option>
                        <option value="Design and Analysis of Algorithm">Design and Analysis of Algorithm</option>
                        <option value="Computer Networks">Computer Networks</option>
                        <option value="Computer Organisation and Architecture">Computer Organisation and Architecture</option>
                    </select>
                </div>

                <div class="field">
                    <label><span class="dot"></span> Session Image</label>
                    <div class="file-zone">
                        <span class="upload-icon">⚡</span>
                        <div class="file-zone-text">
                            <span id="file-name">Drop image or <span>browse</span></span>
                        </div>
                        <input type="file" name="photo" accept="image/*" required onchange="updateFileName(this)">
                    </div>
                </div>

                <div class="divider"></div>

                <button type="submit" class="btn-submit">Execute Analysis</button>
            </form>

            {% if file_link %}
                <a href="{{ url_for('download_file', filename=file_link) }}" class="download-btn">
                    ⬇ Download Attendance Report
                </a>
            {% endif %}

            <div class="status-bar">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    SYSTEM ONLINE
                </div>
                <div class="status-indicator">FACE-REC v2.0</div>
            </div>
        </div>
    </div>

    <script>
        function updateFileName(input) {
            const name = input.files[0] ? input.files[0].name : 'Drop image or <span>browse</span>';
            document.getElementById('file-name').innerHTML = name;
        }
    </script>
</body>
</html>
